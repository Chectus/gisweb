<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Карта Забайкалья | Лаборатория ГИС</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <style>
      body,
      html {
        height: 100%;
        margin: 0;
        overflow: hidden;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
      }

      .wrapper {
        display: flex;
        height: calc(100vh - 56px);
        width: 100vw;
        position: relative;
      }

      /* Широкий сайдбар слоев */
      #layersSidebar {
        width: 390px;
        min-width: 390px;
        max-width: 390px;
        background-color: #ffffff;
        z-index: 1000;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 4px 0 10px rgba(0, 0, 0, 0.1);
        display: flex;
        flex-direction: column;
      }

      #layersSidebar.collapsed {
        margin-left: -390px;
      }

      #map {
        flex-grow: 1;
        height: 100%;
        width: 100%;
        z-index: 1;
      }

      /* Кнопка открытия/закрытия */
      #layersSidebarCollapse {
        position: absolute;
        top: 20px;
        left: 410px;
        z-index: 1001;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      }

      #layersSidebar.collapsed + #layersSidebarCollapse {
        left: 20px;
      }

      /* Фикс чекбоксов: добавляем отступ слева, чтобы иконки не резались */
      .layer-item {
        padding: 12px 14px 12px 42px !important;
        border-radius: 8px;
        transition:
          background-color 0.2s,
          border-color 0.2s;
        border: 1px solid #e9ecef;
        cursor: pointer;
        position: relative;
      }
      .layer-item:hover {
        background-color: #f8f9fa;
        border-color: #dee2e6;
      }
      .layer-item .form-check-input {
        cursor: pointer;
        margin-left: -28px;
        float: left;
        margin-top: 4px;
      }

      .leaflet-attribution-flag {
        display: none !important;
      }

      /* Анимация переворота стрелки в аккордеоне */
      button[aria-expanded="false"] .bi-chevron-down {
        transform: rotate(-90deg);
        transition: transform 0.2s ease;
      }
      button[aria-expanded="true"] .bi-chevron-down {
        transform: rotate(0deg);
        transition: transform 0.2s ease;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand shadow-sm" href="/hub">← Назад в Хаб</a>
        <span class="navbar-text text-white">Рабочее пространство ГИС</span>
      </div>
    </nav>

    <div class="wrapper">
      <nav id="layersSidebar" class="p-3 bg-white border-end">
        <div class="sidebar-header border-bottom pb-2 mb-3">
          <h5 class="fw-bold mb-0">
            <i class="bi bi-layers-half text-primary me-2"></i>Слои карты
          </h5>
        </div>

        <div class="sidebar-content flex-grow-1 overflow-auto">
          <div class="mb-4">
            <label
              class="form-label fw-bold text-secondary small text-uppercase tracking-wider mb-2"
              >Базовая карта (Подложка)</label
            >
            <div class="d-flex flex-column gap-2">
              <div class="form-check layer-item d-flex align-items-center">
                <input
                  class="form-check-input me-3"
                  type="radio"
                  name="baseMapRadio"
                  id="radOsm"
                  checked
                />
                <label class="form-check-label flex-grow-1" for="radOsm">
                  <strong class="d-block mb-1">OpenStreetMap</strong>
                  <span class="text-muted small"
                    >Стандартная карта дорог и населенных пунктов</span
                  >
                </label>
              </div>
              <div class="form-check layer-item d-flex align-items-center">
                <input
                  class="form-check-input me-3"
                  type="radio"
                  name="baseMapRadio"
                  id="radSatellite"
                />
                <label class="form-check-label flex-grow-1" for="radSatellite">
                  <strong class="d-block mb-1">Спутниковые снимки</strong>
                  <span class="text-muted small"
                    >Высокодетальная съемка местности из космоса</span
                  >
                </label>
              </div>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold text-secondary small text-uppercase tracking-wider mb-2">Слои данных NextGIS</label>
            <div class="d-flex flex-column gap-2">
              
              <div class="form-check layer-item d-flex align-items-center">
                <input class="form-check-input me-3" type="checkbox" id="chkBorder" checked />
                <label class="form-check-label flex-grow-1" for="chkBorder">
                  <strong class="d-block mb-1">Граница региона</strong>
                  <span class="text-muted small">Векторный полигон Забайкальского края</span>
                </label>
              </div>

              <div class="form-check layer-item d-flex align-items-center">
                <input class="form-check-input me-3" type="checkbox" id="chkGeology" checked />
                <label class="form-check-label flex-grow-1" for="chkGeology">
                  <strong class="d-block mb-1">Геологические растры</strong>
                  <span class="text-muted small">Данные растровой съемки</span>
                </label>
              </div>

              <div class="border rounded-3 bg-light p-2 mt-2">
                <button
                  class="btn btn-link btn-sm w-100 text-start d-flex justify-content-between align-items-center text-decoration-none fw-bold text-dark ps-2"
                  type="button"
                  data-bs-toggle="collapse"
                  data-bs-target="#geologistsCollapse"
                  aria-expanded="true"
                >
                  <span><i class="bi bi-people-fill text-primary me-2"></i>Участки геологов</span>
                  <i class="bi bi-chevron-down small text-muted toggle-arrow"></i>
                </button>

                <div class="collapse show" id="geologistsCollapse">
                  <div class="d-flex flex-column gap-2 pt-2 px-1">
                    
                    <div class="form-check layer-item d-flex align-items-center bg-white shadow-sm py-2">
                      <input class="form-check-input me-3" type="checkbox" id="chkEgorov" checked />
                      <label class="form-check-label flex-grow-1" for="chkEgorov">
                        <strong class="small d-block fw-semibold">А. Егоров</strong>
                        <span class="text-muted x-small" style="font-size: 0.75rem">Личный рабочий участок</span>
                      </label>
                    </div>

                    <div class="form-check layer-item d-flex align-items-center bg-white shadow-sm py-2">
                      <input class="form-check-input me-3" type="checkbox" id="chkKatasonov" checked />
                      <label class="form-check-label flex-grow-1" for="chkKatasonov">
                        <strong class="small d-block fw-semibold">Н. Катасонов</strong>
                        <span class="text-muted x-small" style="font-size: 0.75rem">Личный рабочий участок</span>
                      </label>
                    </div>

                  </div>
                </div>
              </div> </div> </div> </div> <div class="sidebar-footer border-top pt-2 text-center text-muted small">
          Сервер NextGIS: 213.171.24.19:8081
        </div>
      </nav> <button type="button" id="layersSidebarCollapse" class="btn btn-light border">
        <i class="bi bi-chevron-left" id="layerToggleIcon"></i>
      </button>

      <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.vectorgrid@1.3.0/dist/Leaflet.VectorGrid.bundled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      const nextgisBaseUrl = "http://213.171.24.19:8081";

      // 1. Инициализация карты (Координаты Забайкалья зашиты намертво, noWrap спасет от дублирования мира)
      const map = L.map("map", {
        zoomControl: false,
        minZoom: 3,
        maxZoom: 18,
      }).setView([52.03, 117.5], 6);

      L.control.zoom({ position: "bottomleft" }).addTo(map);

      // Подложки
      const openStreetMap = L.tileLayer(
        "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
        {
          attribution: "&copy; OpenStreetMap",
          noWrap: true,
        },
      ).addTo(map);

      const satelliteMap = L.tileLayer(
        "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
        {
          attribution: "Tiles &copy; Esri",
          noWrap: true,
        },
      );

      // 2. ИНТЕГРАЦИЯ ГРАНИЦЫ ЧЕРЕЗ ССЫЛКУ MVT
      const mvtUrl = `${nextgisBaseUrl}/api/component/feature_layer/mvt?resource=3&z={z}&x={x}&y={y}`;

      const zabaykalskyBorder = L.vectorGrid
        .protobuf(mvtUrl, {
          vectorTileLayerStyles: {
            'ngw:3': {
              color: "#0d6efd", // Синяя граница
              weight: 3, // Толщина линии
              fillColor: "#0d6efd",
              fillOpacity: 0.08, // Легкая заливка
              fill: true,
            },
          },
        })
        .addTo(map);

      // Ссылка на слой Егорова (ресурс 5)
      const egorovMvtUrl = `${nextgisBaseUrl}/api/component/feature_layer/mvt?resource=5&z={z}&x={x}&y={y}`;

      const layerEgorov = L.vectorGrid
        .protobuf(egorovMvtUrl, {
          vectorTileLayerStyles: {
            // Рендерим участок красивым оранжевым цветом
            'ngw:5': {
              color: "#fd7e14", // Цвет линии
              weight: 3, // Толщина контура
              fillColor: "#fd7e14",
              fillOpacity: 0.12, // Легкая прозрачная заливка
              fill: true,
            },
          },
        })
        .addTo(map);

      // Ссылка на слой Катасонова (ресурс 7)
      const katasonovMvtUrl = `${nextgisBaseUrl}/api/component/feature_layer/mvt?resource=7&z={z}&x={x}&y={y}`;

      const layerKatasonov = L.vectorGrid
        .protobuf(katasonovMvtUrl, {
          vectorTileLayerStyles: {
            // Рендерим участок красивым оранжевым цветом
            'ngw:7': {
              color: "#fd7e14", // Цвет линии
              weight: 3, // Толщина контура
              fillColor: "#fd7e14",
              fillOpacity: 0.12, // Легкая прозрачная заливка
              fill: true,
            },
          },
        })
        .addTo(map);

      // ЦМР как растровый слой (90м)
      const geologyRaster = L.tileLayer(
        `${nextgisBaseUrl}/api/component/render/tile?resource=10&nd=204&z={z}&x={x}&y={y}`,
        { noWrap: true },
      ).addTo(map);

      // Остальные растровые слои NextGIS
      const mapBorders = L.tileLayer(
        `${nextgisBaseUrl}/api/component/render/tile?resource=72,70,74,76,101,94&nd=204&z={z}&x={x}&y={y}`,
        { noWrap: true },
      ).addTo(map);
      const gridLines = L.tileLayer(
        `${nextgisBaseUrl}/api/component/render/tile?resource=98,96&nd=204&z={z}&x={x}&y={y}`,
        { noWrap: true },
      ).addTo(map);

      // 3. Логика Сайдбара
      const layersSidebar = document.getElementById("layersSidebar");
      const layersSidebarCollapse = document.getElementById(
        "layersSidebarCollapse",
      );
      const layerToggleIcon = document.getElementById("layerToggleIcon");

      layersSidebarCollapse.addEventListener("click", () => {
        layersSidebar.classList.toggle("collapsed");
        layerToggleIcon.className = layersSidebar.classList.contains(
          "collapsed",
        )
          ? "bi bi-chevron-right"
          : "bi bi-chevron-left";
        setTimeout(() => {
          map.invalidateSize();
        }, 300);
      });

      // 4. Переключение подложек
      document.getElementById("radOsm").addEventListener("change", (e) => {
        if (e.target.checked) {
          map.addLayer(openStreetMap);
          map.removeLayer(satelliteMap);
        }
      });
      document
        .getElementById("radSatellite")
        .addEventListener("change", (e) => {
          if (e.target.checked) {
            map.addLayer(satelliteMap);
            map.removeLayer(openStreetMap);
          }
        });

      // 5. Переключение слоев
      setupLayerToggle("chkBorder", zabaykalskyBorder);
      setupLayerToggle("chkGeology", geologyRaster);
      setupLayerToggle("chkEgorov", layerEgorov); // Наш геолог Егоров
      setupLayerToggle("chkKatasonov", layerKatasonov);

      function setupLayerToggle(checkboxId, leafletLayer) {
        document.getElementById(checkboxId).addEventListener("change", (e) => {
          if (e.target.checked) {
            map.addLayer(leafletLayer);
          } else {
            map.removeLayer(leafletLayer);
          }
        });
      }
    </script>
  </body>
</html>
