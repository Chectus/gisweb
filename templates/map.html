<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта Забайкалья | Лаборатория ГИС</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <style>
        #map {
            height: calc(100vh - 56px);
            width: 100%;
        }
        .leaflet-attribution-flag {
            display: none !important;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand shadow-sm" href="/hub">← Назад в Хаб</a>
            <span class="navbar-text text-white">Рабочее пространство ГИС</span>
        </div>
    </nav>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([52.03, 113.50], 6);

    const openStreetMap = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    });

    openStreetMap.addTo(map);

    const geologyRaster = L.tileLayer('http://localhost:8080/api/component/render/tile?resource=88,90,86,92,84,82,80,78&nd=204&z={z}&x={x}&y={y}', {
        attribution: '&copy; NextGIS Растры',
        opacity: 0.8
    });

    const mapBorders = L.tileLayer('http://localhost:8080/api/component/render/tile?resource=72,70,74,76,101,94&nd=204&z={z}&x={x}&y={y}', {
        attribution: '&copy; NextGIS Границы'
    });

    const gridLines = L.tileLayer('http://localhost:8080/api/component/render/tile?resource=98,96&nd=204&z={z}&x={x}&y={y}', {
        attribution: '&copy; NextGIS Сетка'
    });

    geologyRaster.addTo(map);
    mapBorders.addTo(map);
    gridLines.addTo(map);

    const baseMaps = {
        "OpenStreetMap": openStreetMap
    };

    const overlayMaps = {
        "Геологические растры": geologyRaster,
        "Контуры и границы": mapBorders,
        "Координатная сетка": gridLines
    };

    L.control.layers(baseMaps, overlayMaps).addTo(map);
</script>
</body>
</html>
